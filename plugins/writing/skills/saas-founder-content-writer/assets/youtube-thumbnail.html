<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<style>
  /* 9:16 YouTube Shorts thumbnail — render at 1080x1920, scale 2.
     Self-contained: no external network assets. Edit TEXT below. */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; }
  .card {
    width: 1080px; height: 1920px;
    display: flex; flex-direction: column; justify-content: center;
    padding: 120px 90px; gap: 40px;
    background: #0b0b0f;
    font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    color: #fff;
  }
  .kicker { font-size: 44px; font-weight: 600; color: #0A84FF; letter-spacing: 2px; }
  .title { font-size: 132px; font-weight: 800; line-height: 1.08; }
  .title em { font-style: normal; color: #0A84FF; }
  .sub { font-size: 52px; font-weight: 500; color: #b8b8c0; line-height: 1.3; }
</style>
</head>
<body>
  <div class="card">
    <div class="kicker">Your channel tagline</div>
    <div class="title">What is X<br/><em>really</em>?</div>
    <div class="sub">The myth this kills</div>
  </div>
</body>
</html>
