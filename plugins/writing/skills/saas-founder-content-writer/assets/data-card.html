<!doctype html>
<!--
  Data / metric card — a starting template, not a rigid spec.
  Good for build-in-public numbers. Works as a 3:4 Xiaohongshu card or 1:1 square.
  Edit the metrics and CSS variables. Render at 1080×1440 (3:4):
    node ../scripts/render-image.js data-card.html out.png --width=1080 --height=1440
-->
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0b1220;
        --ink: #f8fafc;
        --muted: #94a3b8;
        --accent: #34d399;
        --line: #1e293b;
      }
      * { margin: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1440px; }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "PingFang SC", "Microsoft YaHei", -apple-system, "Segoe UI", sans-serif;
        padding: 110px 90px;
        display: flex;
        flex-direction: column;
      }
      .eyebrow { font-size: 34px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
      h1 { font-size: 76px; font-weight: 900; line-height: 1.18; margin-top: 18px; letter-spacing: -1px; }
      .metrics { margin-top: 90px; display: flex; flex-direction: column; gap: 56px; }
      .metric { border-left: 8px solid var(--accent); padding-left: 36px; }
      .metric .value { font-size: 104px; font-weight: 900; line-height: 1; letter-spacing: -2px; }
      .metric .value .unit { font-size: 48px; color: var(--accent); }
      .metric .label { font-size: 36px; color: var(--muted); margin-top: 16px; }
      footer { margin-top: auto; padding-top: 32px; border-top: 2px solid var(--line); font-size: 30px; color: var(--muted); }
    </style>
  </head>
  <body>
    <div class="eyebrow">90-day retrospective</div>
    <h1>The two things that drove most growth</h1>
    <div class="metrics">
      <div class="metric">
        <div class="value">40 → 310<span class="unit"> teams</span></div>
        <div class="label">Paying teams (in 90 days)</div>
      </div>
      <div class="metric">
        <div class="value">−60<span class="unit">%</span></div>
        <div class="label">p95 latency drop after rewrite</div>
      </div>
    </div>
    <footer>Use real numbers — double-check before publishing</footer>
  </body>
</html>
